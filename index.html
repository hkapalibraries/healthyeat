<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Resources - Healthy Eating</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', 'Noto Sans TC', sans-serif;
            background-color: #ffffff;
            color: #333;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #f0f0f0;
        }
        .book-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #f9f9f9;
        }
        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            border-color: #4CAF50;
        }
        .filter-btn.active {
            background-color: #2E7D32;
            color: white;
            border-color: #2E7D32;
        }
        /* QR Code 懸浮樣式 */
        .qr-overlay {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 70px;
            height: 70px;
            background: white;
            padding: 4px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
    </style>
</head>
<body class="custom-scrollbar">

    <!-- Navigation (僅保留 Logo) -->
    <nav class="glass-header sticky top-0 z-50 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-green-600 text-white p-2 rounded-lg">
                <i class="fa-solid fa-book-bookmark"></i>
            </div>
            <span class="font-bold text-xl tracking-tight text-gray-800">HKAPA LIBRARY</span>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="py-20 px-6 max-w-7xl mx-auto text-center">
        <span class="inline-block px-8 py-3 bg-green-50 text-green-700 rounded-full text-xl font-bold mb-6 uppercase tracking-widest shadow-sm">Library Resources 圖書館資源</span>
        <h1 class="text-5xl md:text-7xl font-bold mb-6 text-gray-900 leading-tight">Healthy Eating 健康飲食</h1>
    </header>

    <!-- Filter Area -->
    <section class="px-6 max-w-7xl mx-auto mb-16">
        <div class="flex justify-center bg-gray-50 p-6 rounded-3xl border border-gray-100">
            <div class="flex gap-4 overflow-x-auto pb-2 md:pb-0 px-2">
                <button class="filter-btn active px-6 md:px-10 py-3 rounded-2xl border border-gray-200 text-xs md:text-sm font-semibold transition whitespace-nowrap shadow-sm flex flex-col items-center gap-0.5" onclick="filterBooks('all', this)">
                    <span>全部資源</span>
                    <span class="text-[10px] opacity-80 font-normal uppercase">All Resources</span>
                </button>
                <button class="filter-btn px-6 md:px-10 py-3 rounded-2xl border border-gray-200 text-xs md:text-sm font-semibold hover:border-green-500 transition whitespace-nowrap shadow-sm flex flex-col items-center gap-0.5" onclick="filterBooks('Physical Book', this)">
                    <span>實體書</span>
                    <span class="text-[10px] opacity-80 font-normal uppercase">Physical Books</span>
                </button>
                <button class="filter-btn px-6 md:px-10 py-3 rounded-2xl border border-gray-200 text-xs md:text-sm font-semibold hover:border-green-500 transition whitespace-nowrap shadow-sm flex flex-col items-center gap-0.5" onclick="filterBooks('eBook', this)">
                    <span>電子書</span>
                    <span class="text-[10px] opacity-80 font-normal uppercase">eBooks</span>
                </button>
            </div>
        </div>
    </section>

    <!-- Book Grid -->
    <main class="px-6 max-w-7xl mx-auto mb-24">
        <div id="bookGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <!-- Books will be injected here by JS -->
        </div>
    </main>

    <script>
        // 圖片錯誤處理函數：隱藏破圖元素，顯示下層的 Tailwind 佔位符
        window.handleImageError = function(imgElement) {
            imgElement.style.display = 'none';
        };

        const bookData = [
            { 
                title: "Nutrition for the dancer", 
                author: "Mastin, Zerlina.", 
                type: "Physical Book", 
                url: "http://lib.hkapa.edu/bib/991001219699704326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_book_6.jpg" 
            },
            { 
                title: "史上最完整1000種全食物營養大圖鑑", 
                author: "余素維, 吳思薇.", 
                type: "Physical Book", 
                url: "http://lib.hkapa.edu/bib/991002020229104326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_book_7.jpg" 
            },
            { 
                title: "吃出好膚質：營養師教你從飲食養好肌", 
                author: "潘仕寶.", 
                type: "Physical Book", 
                url: "http://lib.hkapa.edu/bib/991002014329204326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_book_8.jpg" 
            },
            { 
                title: "圖解營養學", 
                author: "侯玉珍.", 
                type: "Physical Book", 
                url: "http://lib.hkapa.edu/bib/991001433349704326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_book_9.jpg" 
            },
            { 
                title: "圖解黃帝內經精華：掌握養生基本原則", 
                author: "臧俊岐.", 
                type: "Physical Book", 
                url: "http://lib.hkapa.edu/bib/991002015229004326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_book_10.jpg" 
            },
            { 
                title: "廚房裡的秘密：飲食的科學及文化", 
                author: "徐明達.", 
                type: "Physical Book", 
                url: "http://lib.hkapa.edu/bib/991001209869704326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_book_11.jpg" 
            },
            { 
                title: "沙漏式飲食法：席捲全球的抗老化飲食", 
                author: "Verburgh, Kris.", 
                type: "Physical Book", 
                url: "http://lib.hkapa.edu/bib/991001470059704326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_book_12.jpg" 
            },
            { 
                title: "總是精神百倍的人，吃的跟你不一樣?", 
                author: "柴崎真木.", 
                type: "Physical Book", 
                url: "http://lib.hkapa.edu/bib/991002013529704326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_book_13.jpg" 
            },
            { 
                title: "香港人是時候轉「營」：貼地的營養指南", 
                author: "黃凱詩.", 
                type: "Physical Book", 
                url: "http://lib.hkapa.edu/bib/991002086927804326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_book_5.jpg" 
            },
            { 
                title: "Eating well for good health", 
                author: "Menza, Valeria.", 
                type: "eBook", 
                url: "http://lib.hkapa.edu/bib/991002120501104326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_ebook_18.jpg" 
            },
            { 
                title: "Food, nutrition and eating behavior", 
                author: "Merrick, Joav.", 
                type: "eBook", 
                url: "http://lib.hkapa.edu/bib/991002120337704326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_ebook_17.jpg" 
            },
            { 
                title: "24節氣養生食方", 
                author: "中國養生文化研究中心", 
                type: "eBook", 
                url: "http://lib.hkapa.edu/bib/991002269921504326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_ebook_24.jpg" 
            },
            { 
                title: "不節食更健康：破除減肥迷思", 
                author: "Turner, Pixie.", 
                type: "eBook", 
                url: "http://lib.hkapa.edu/bib/991002172849404326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_ebook_26.jpg" 
            },
            { 
                title: "失控的不是血糖，是你的飲食", 
                author: "講糖教父", 
                type: "eBook", 
                url: "http://lib.hkapa.edu/bib/991002226515204326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_ebook_23.jpg" 
            },
            { 
                title: "從五味看五臟：本草綱目中的養生營養", 
                author: "趙德喜.", 
                type: "eBook", 
                url: "http://lib.hkapa.edu/bib/991002317717704326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_ebook_22.jpg" 
            },
            { 
                title: "超級大腦飲食計畫", 
                author: "Lugavere, Max.", 
                type: "eBook", 
                url: "http://lib.hkapa.edu/bib/991002318167004326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_ebook_19.jpg" 
            },
            { 
                title: "高血脂的中醫保健：日常保健與飲食", 
                author: "林曉軒.", 
                type: "eBook", 
                url: "http://lib.hkapa.edu/bib/991002317813104326",
                img: "https://libapps-au.s3-ap-southeast-2.amazonaws.com/accounts/216622/images/202409_ebook_21.jpg" 
            }
        ];

        let currentFilter = 'all';

        function renderBooks(data) {
            const grid = document.getElementById('bookGrid');
            grid.innerHTML = '';
            
            data.forEach(book => {
                const typeColor = book.type === 'eBook' ? 'bg-blue-50 text-blue-600' : 'bg-green-50 text-green-700';
                const icon = book.type === 'eBook' ? 'fa-tablet-screen-button' : 'fa-book';
                
                // 動態生成 QR Code 網址
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(book.url)}`;

                const card = `
                    <div class="book-card bg-white rounded-3xl p-6 flex flex-col items-center text-center shadow-sm">
                        <!-- 封面容器 -->
                        <div class="relative w-full aspect-[3/4.2] rounded-2xl overflow-hidden shadow-lg mb-6 bg-gray-100 border border-gray-100 group flex items-center justify-center">
                            
                            <!-- Tailwind 佔位樣式 (當圖片加載失敗或未加載時顯示) -->
                            <div class="absolute inset-0 flex flex-col items-center justify-center text-gray-300">
                                <i class="fa-solid fa-image text-4xl mb-2"></i>
                                <span class="text-xs font-semibold uppercase tracking-wider">Loading...</span>
                            </div>

                            <!-- 書籍封面 (絕對定位於佔位符上方) -->
                            <img src="${book.img}" 
                                 alt="${book.title}" 
                                 class="absolute inset-0 w-full h-full object-cover transition duration-500 group-hover:scale-105"
                                 onclick="window.open('${book.url}', '_blank')"
                                 style="cursor: pointer; z-index: 10;"
                                 onerror="handleImageError(this)">
                            
                            <!-- 右下角 QR Code (層級最高) -->
                            <div class="qr-overlay">
                                <img src="${qrUrl}" alt="Scan to view" class="w-full h-full">
                            </div>
                        </div>

                        <!-- 文字資訊 -->
                        <div class="flex-grow">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider mb-4 ${typeColor}">
                                <i class="fa-solid ${icon}"></i> ${book.type}
                            </span>
                            <h3 class="font-bold text-gray-900 line-clamp-2 mb-2 leading-tight px-2 text-base md:text-lg h-12">${book.title}</h3>
                            <p class="text-sm text-gray-500 italic mb-2">${book.author}</p>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function filterBooks(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const filtered = bookData.filter(book => {
                return currentFilter === 'all' || book.type === currentFilter;
            });
            renderBooks(filtered);
        }

        // 初始渲染
        renderBooks(bookData);
    </script>
</body>
</html>
